<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Register - Home Tutor</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header slim">
    <div class="container header-row">
      <a href="/" class="brand">
        <div class="logo">Home Tutor</div>
      </a>
      <div class="auth-actions">
        <a class="btn btn-outline" href="/login.html">Login</a>
        <a class="btn btn-primary" href="/register.html">Sign Up</a>
      </div>
    </div>
  </header>

  <main class="container center-card">
    <div class="card form-card">
      <h2>Create your account</h2>
      <p class="muted">Sign up to find expert tutors and book lessons instantly.</p>
      <form id="registerForm" class="form" action="/users/register" method="post">
        <div class="row">
          <label>Full Name
            <input type="text" name="fullname" placeholder="e.g. Alex Morgan" required>
          </label>
          <label>Username
            <input type="text" name="username" placeholder="Choose a username" required>
          </label>
        </div>
        <label>Email Address
          <input type="email" name="email" placeholder="you@example.com" required>
        </label>
        <div class="row">
          <label>Password
            <input type="password" name="password" placeholder="Create a strong password" required>
          </label>
          <label>Membership
            <select name="membership">
              <option>Free Plan</option>
              <option>Premium Plan</option>
            </select>
          </label>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary large" type="submit">Create Account</button>
          <a class="link" href="/login.html">Already registered? Log in here</a>
        </div>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">© 2026 Home Tutor. All rights reserved.</div>
  </footer>
</body>
</html>
