<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login - Home Tutor</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header slim">
    <div class="container header-row">
      <a href="/" class="brand">
        <div class="logo">Home Tutor</div>
      </a>
      <div class="auth-actions">
        <a class="btn btn-outline" href="/login.html">Login</a>
        <a class="btn btn-primary" href="/register.html">Sign Up</a>
      </div>
    </div>
  </header>

  <main class="container center-card">
    <div class="card form-card">
      <h2>Welcome back</h2>
      <p class="muted">Login to manage your bookings and lessons.</p>
      <form id="loginForm" class="form" action="/users/login" method="post">
        <label>Username or Email
          <input type="text" name="username" placeholder="e.g. alex@example.com" required>
        </label>
        <label>Password
          <input type="password" name="password" placeholder="Enter your password" required>
        </label>
        <div class="form-actions">
          <button class="btn btn-primary large" type="submit">Log In to Dashboard</button>
          <a class="link" href="/register.html">Don't have an account? Create one</a>
        </div>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">© 2026 Home Tutor. All rights reserved.</div>
  </footer>
</body>
</html>
