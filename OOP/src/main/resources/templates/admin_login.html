<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Login - Home Tutor</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header slim">
    <div class="container header-row">
      <a href="/" class="brand">
        <div class="logo">Home Tutor <span style="font-size: 1rem; color: var(--text-muted); font-weight: 500;">Admin</span></div>
      </a>
      <div class="auth-actions">
        <a class="btn btn-outline" href="/users/login">User Login</a>
        <a class="btn btn-primary" href="/users/register">Sign Up</a>
      </div>
    </div>
  </header>

  <main class="container center-card">
    <div class="card form-card">
      <h2>Admin Sign In</h2>
      <p class="muted">Enter your admin credentials and OTP.</p>

      <div th:if="${error}" class="alert alert-error">
        <strong>Login Failed</strong><br>
        Invalid admin credentials or OTP.
      </div>

      <form id="adminLoginForm" class="form" action="/admin/login" method="post">
        <label>Username or Email
          <input type="text" name="username" placeholder="admin@gmail.com" required>
        </label>
        <label>Password
          <input type="password" name="password" placeholder="Enter your password" required>
        </label>
        <label>OTP
          <input type="text" name="otp" placeholder="Enter OTP" required>
        </label>
        <div class="form-actions">
          <button class="btn btn-primary large" type="submit">Log In as Admin</button>
        </div>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">© 2026 Home Tutor. Admin Portal.</div>
  </footer>
</body>
</html>
