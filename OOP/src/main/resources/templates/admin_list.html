<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin - User List</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header slim">
    <div class="container header-row">
      <a href="/" class="brand">
        <div class="logo">Home Tutor <span style="font-size: 1rem; color: var(--text-muted); font-weight: 500;">Admin</span></div>
      </a>
      <div class="auth-actions">
        <a class="btn btn-outline" href="/login.html">Logout</a>
      </div>
    </div>
  </header>

  <main class="container admin-page">
    <!-- Success/Info Messages -->
    <div id="successMessage" class="alert alert-success" style="display: none; margin-bottom: 16px;">
      <span id="messageText"></span>
    </div>

    <div class="admin-top">
      <h2>Registered Students</h2>
      <div class="search-row">
        <input id="searchInput" placeholder="Search by username or ID..." />
        <button id="searchBtn" class="btn btn-primary">Search</button>
      </div>
    </div>

    <div class="user-cards" th:if="${users != null and users.size() > 0}">
      <div class="user-card" th:each="user : ${users}">
        <div class="meta">
          <strong th:text="${user.username}">username</strong>
          <span class="id" th:text="${'#' + user.id}">#1001</span>
        </div>
        <div class="info" th:text="${user.email}">email@example.com</div>
        <div class="actions">
          <span class="badge" th:text="${user.membershipType}" th:classappend=" ${user.membershipType.toLowerCase()}">Premium</span>
          <div class="action-btns">
            <button class="btn btn-sm btn-outline" th:attr="data-view-id=${user.id}">View</button>
            <button class="btn btn-sm btn-danger" th:attr="data-delete-id=${user.id}">Delete</button>
          </div>
        </div>
      </div>
    </div>

    <div class="user-cards" th:if="${users == null or users.size() == 0}">
      <div class="user-card">No users found.</div>
    </div>
  </main>

  <!-- User Details Modal -->
  <div id="userDetailModal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
    <div class="modal-content" style="background: white; padding: 24px; border-radius: 8px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
        <h3>User Details</h3>
        <button id="closeModal" style="background: none; border: none; font-size: 24px; cursor: pointer;">&times;</button>
      </div>
      <div id="modalBody">
        <!-- User details will be inserted here -->
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="container">© 2026 Home Tutor. Admin Portal.</div>
  </footer>

  <script>
    // Show success message
    function showSuccessMessage(message) {
      var successDiv = document.getElementById('successMessage');
      var messageText = document.getElementById('messageText');
      messageText.textContent = message;
      successDiv.style.display = 'block';
      setTimeout(function() {
        successDiv.style.display = 'none';
      }, 3000);
    }

    // Display user details in modal
    function viewUser(user) {
      var modalBody = document.getElementById('modalBody');
      modalBody.innerHTML = 
        '<div style="margin-bottom: 16px;">' +
          '<label style="font-weight: bold; display: block; margin-bottom: 4px;">Username:</label>' +
          '<p style="margin: 0;">' + user.username + '</p>' +
        '</div>' +
        '<div style="margin-bottom: 16px;">' +
          '<label style="font-weight: bold; display: block; margin-bottom: 4px;">Email:</label>' +
          '<p style="margin: 0;">' + user.email + '</p>' +
        '</div>' +
        '<div style="margin-bottom: 16px;">' +
          '<label style="font-weight: bold; display: block; margin-bottom: 4px;">Membership Type:</label>' +
          '<p style="margin: 0;">' + user.membershipType + '</p>' +
        '</div>';
      
      document.getElementById('userDetailModal').style.display = 'flex';
    }

    // Close modal
    document.addEventListener('DOMContentLoaded', function() {
      var closeBtn = document.getElementById('closeModal');
      if (closeBtn) {
        closeBtn.addEventListener('click', function() {
          document.getElementById('userDetailModal').style.display = 'none';
        });
      }

      // Close modal when clicking outside
      document.getElementById('userDetailModal').addEventListener('click', function(e) {
        if (e.target === this) {
          this.style.display = 'none';
        }
      });
    });

    function renderUsers(users) {
      var container = document.querySelector('.user-cards');
      container.innerHTML = '';

      if (!users || users.length === 0) {
        var empty = document.createElement('div');
        empty.className = 'user-card';
        empty.textContent = 'No users found.';
        container.appendChild(empty);
        return;
      }

      users.forEach(function(user) {
        var membership = (user.membershipType || 'FREE').toLowerCase();
        var card = document.createElement('div');
        card.className = 'user-card';
        card.innerHTML =
          '<div class="meta">' +
            '<strong>' + user.username + '</strong>' +
            '<span class="id">#' + user.id + '</span>' +
          '</div>' +
          '<div class="info">' + user.email + '</div>' +
          '<div class="actions">' +
            '<span class="badge ' + membership + '">' + user.membershipType + '</span>' +
            '<div class="action-btns">' +
              '<button class="btn btn-sm btn-outline" data-view-id="' + user.id + '">View</button>' +
              '<button class="btn btn-sm btn-danger" data-delete-id="' + user.id + '">Delete</button>' +
            '</div>' +
          '</div>';
        container.appendChild(card);
      });

      // Attach view button listeners
      container.querySelectorAll('[data-view-id]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var userId = btn.getAttribute('data-view-id');
          var user = users.find(function(u) { return u.id == userId; });
          if (user) {
            viewUser(user);
          }
        });
      });

      // Attach delete button listeners
      container.querySelectorAll('[data-delete-id]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var id = btn.getAttribute('data-delete-id');
          if (confirm('Are you sure you want to delete this user? This action cannot be undone.')) {
            deleteUser(id);
          }
        });
      });
    }

    function searchUsers() {
      var q = document.getElementById('searchInput').value;
      fetch('/admin/users/search?query=' + encodeURIComponent(q))
        .then(function(res) { return res.json(); })
        .then(renderUsers)
        .catch(function() { renderUsers([]); });
    }

    function deleteUser(id) {
      fetch('/admin/users/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'id=' + encodeURIComponent(id)
      })
      .then(function() { 
        showSuccessMessage('User account has been successfully deleted.');
        searchUsers();
      })
      .catch(function(err) {
        console.error('Delete error:', err);
        showSuccessMessage('Error deleting user.');
      });
    }

    document.getElementById('searchBtn').addEventListener('click', function() {
      searchUsers();
    });

    document.getElementById('searchInput').addEventListener('input', function() {
      searchUsers();
    });

    searchUsers();
  </script>
</body>
</html>
