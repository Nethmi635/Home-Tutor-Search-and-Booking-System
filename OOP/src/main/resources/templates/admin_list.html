<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin - User List</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header slim">
    <div class="container header-row">
      <a href="/" class="brand">
        <div class="logo">Home Tutor <span style="font-size: 1rem; color: var(--text-muted); font-weight: 500;">Admin</span></div>
      </a>
      <div class="auth-actions">
        <a class="btn btn-outline" href="/login.html">Logout</a>
      </div>
    </div>
  </header>

  <main class="container admin-page">
    <div class="admin-top">
      <h2>Registered Students</h2>
      <div class="search-row">
        <input id="searchInput" placeholder="Search by username or ID..." />
        <button id="searchBtn" class="btn btn-primary">Search</button>
      </div>
    </div>

    <div class="user-cards" th:if="">
      <div class="user-card" th:each="user : ">
        <div class="meta">
          <strong th:text="">username</strong>
          <span class="id" th:text="'#' + ">#1001</span>
        </div>
        <div class="info" th:text="">email@example.com</div>
        <div class="actions">
          <span class="badge" th:text="" th:classappend="">Premium</span>
          <div class="action-btns">
            <button class="btn btn-sm btn-outline" th:data-view-id="">View</button>
            <button class="btn btn-sm btn-danger" th:data-delete-id="">Delete</button>
          </div>
        </div>
      </div>
    </div>

    <div class="user-cards" th:if="">
      <div class="user-card">No users found.</div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">© 2026 Home Tutor. Admin Portal.</div>
  </footer>

  <script>
    function renderUsers(users) {
      var container = document.querySelector('.user-cards');
      container.innerHTML = '';

      if (!users || users.length === 0) {
        var empty = document.createElement('div');
        empty.className = 'user-card';
        empty.textContent = 'No users found.';
        container.appendChild(empty);
        return;
      }

      users.forEach(function(user) {
        var membership = (user.membershipType || 'FREE').toLowerCase();
        var card = document.createElement('div');
        card.className = 'user-card';
        card.innerHTML =
          '<div class="meta">' +
            '<strong>' + user.username + '</strong>' +
            '<span class="id">#' + user.id + '</span>' +
          '</div>' +
          '<div class="info">' + user.email + '</div>' +
          '<div class="actions">' +
            '<span class="badge ' + membership + '">' + user.membershipType + '</span>' +
            '<div class="action-btns">' +
              '<button class="btn btn-sm btn-outline" data-view-id="' + user.id + '">View</button>' +
              '<button class="btn btn-sm btn-danger" data-delete-id="' + user.id + '">Delete</button>' +
            '</div>' +
          '</div>';
        container.appendChild(card);
      });

      container.querySelectorAll('[data-delete-id]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var id = btn.getAttribute('data-delete-id');
          deleteUser(id);
        });
      });
    }

    function searchUsers() {
      var q = document.getElementById('searchInput').value;
      fetch('/admin/users/search?query=' + encodeURIComponent(q))
        .then(function(res) { return res.json(); })
        .then(renderUsers)
        .catch(function() { renderUsers([]); });
    }

    function deleteUser(id) {
      fetch('/admin/users/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'id=' + encodeURIComponent(id)
      })
      .then(function() { searchUsers(); });
    }

    document.getElementById('searchBtn').addEventListener('click', function() {
      searchUsers();
    });

    document.getElementById('searchInput').addEventListener('input', function() {
      searchUsers();
    });

    searchUsers();
  </script>
</body>
</html>
